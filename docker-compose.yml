# Full Manthana org stack: the server + Postgres + MinIO, one command.
#
#   cp .env.example .env     # set JWT secret, admin token, (optional) ANTHROPIC_API_KEY
#   docker compose up -d     # builds the server image, starts pg + minio + bucket + server
#   open http://localhost:8000/ui   # founder console (sign in with the admin token)
#
# The server container reaches pg/minio by service name (postgres:5432, minio:9000);
# host ports below (5433, 9000/9001, 8000) are for your machine. Tests still run on
# SQLite + in-memory and need none of this. See docs/deploy.md.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: manthana
      POSTGRES_PASSWORD: manthana
      POSTGRES_DB: manthana
    ports:
      - "5433:5432"  # host 5433 (avoids clashing with a host Postgres on 5432)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manthana"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: manthana
      MINIO_ROOT_PASSWORD: manthana-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # One-shot: wait for MinIO, then create the raw-transcript bucket (idempotent).
  minio-setup:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 manthana manthana-secret; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb --ignore-existing local/manthana-raw;
      echo 'bucket manthana-raw ready';
      "

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env            # secrets: MANTHANA_SERVER_JWT_SECRET, _ADMIN_TOKEN, ANTHROPIC_API_KEY, _LLM
    environment:              # in-cluster wiring (overrides any host values in .env)
      MANTHANA_SERVER_DB_URL: postgresql+psycopg://manthana:manthana@postgres:5432/manthana
      MANTHANA_SERVER_OBJECT_STORE: s3
      MANTHANA_SERVER_S3_BUCKET: manthana-raw
      MANTHANA_SERVER_S3_ENDPOINT_URL: http://minio:9000
      MANTHANA_SERVER_S3_ACCESS_KEY: manthana
      MANTHANA_SERVER_S3_SECRET_KEY: manthana-secret
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys,urllib.request as u; sys.exit(0 if u.urlopen('http://localhost:8000/readyz').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
  miniodata:
